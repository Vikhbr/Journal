<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mein Journal">
<title>Mein Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --surface:#111118; --surface2:#18181f;
  --border:rgba(255,255,255,0.06); --gold:#c9a96e; --gold2:#e8c98a;
  --violet:#8b7cf8; --text:#e8e8f0; --muted:#5a5a70;
  --success:#4ade80; --danger:#f87171; --warning:#fbbf24;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}
#app{height:100vh;display:flex;flex-direction:column;max-width:520px;margin:0 auto;position:relative;}
#content{flex:1;overflow-y:auto;padding:0 0 100px;-webkit-overflow-scrolling:touch;}
#content::-webkit-scrollbar{display:none;}
nav{position:absolute;bottom:0;left:0;right:0;background:rgba(11,11,17,0.97);border-top:1px solid var(--border);display:flex;padding:8px 0 max(12px,env(safe-area-inset-bottom));backdrop-filter:blur(20px);z-index:100;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;transition:color 0.2s;padding:4px 0;}
.nb .ico{font-size:22px;line-height:1;}
.nb.on{color:var(--gold);}
.hdr{padding:max(44px,env(safe-area-inset-top)) 20px 20px;background:radial-gradient(ellipse at 50% -20%,rgba(201,169,110,0.1) 0%,transparent 70%);text-align:center;}
.hdr-date{font-size:11px;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:6px;}
.hdr-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:var(--gold2);}
.hdr-sub{font-size:13px;color:var(--muted);margin-top:3px;}
.card{margin:0 14px 10px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px;position:relative;}
.card::after{content:'';position:absolute;top:0;left:20px;right:20px;height:1px;background:linear-gradient(90deg,transparent,rgba(201,169,110,0.2),transparent);}
.ct{font-size:10px;font-weight:600;color:var(--gold);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:14px;}
.quote{margin:0 14px 10px;background:linear-gradient(135deg,rgba(201,169,110,0.06),rgba(139,124,248,0.04));border:1px solid rgba(201,169,110,0.15);border-radius:18px;padding:18px;}
.quote-t{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;font-weight:300;color:var(--gold2);line-height:1.65;margin-bottom:8px;}
.quote-s{font-size:11px;color:var(--muted);text-align:right;}
.sl-row{margin-bottom:16px;}
.sl-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:7px;}
.sl-lbl{font-size:13px;color:#9090a8;}
.sl-val{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--gold2);line-height:1;}
.sl-desc{font-size:10px;color:var(--muted);margin-top:1px;}
input[type=range]{width:100%;height:3px;border-radius:2px;-webkit-appearance:none;appearance:none;outline:none;cursor:pointer;background:linear-gradient(to right,var(--gold) 0%,var(--gold) var(--p,60%),rgba(255,255,255,0.08) var(--p,60%));}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--gold2);border:2.5px solid var(--bg);cursor:pointer;box-shadow:0 0 10px rgba(201,169,110,0.5);}
.fl{font-size:13px;color:#9090a8;margin-bottom:7px;display:block;}
.fg{margin-bottom:14px;}
textarea,input[type=text]{width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:11px;padding:11px 13px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;resize:none;line-height:1.55;outline:none;transition:border-color 0.2s;-webkit-appearance:none;}
textarea:focus,input[type=text]:focus{border-color:rgba(201,169,110,0.35);}
.stags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;}
.stag{padding:7px 13px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:13px;cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;user-select:none;}
.stag.on{background:rgba(201,169,110,0.12);border-color:rgba(201,169,110,0.5);color:var(--gold2);}
.stag.danger{background:rgba(248,113,113,0.1);border-color:rgba(248,113,113,0.4);color:var(--danger);}
.trow{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.tnum{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold);min-width:20px;}
.tinp{flex:1;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;}
.tinp:focus{border-color:rgba(201,169,110,0.35);}
.tgl{display:flex;gap:8px;margin-bottom:10px;}
.tglb{flex:1;padding:11px;border-radius:11px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all 0.15s;}
.tglb.yes{background:rgba(74,222,128,0.1);border-color:rgba(74,222,128,0.4);color:var(--success);}
.tglb.no{background:rgba(248,113,113,0.1);border-color:rgba(248,113,113,0.4);color:var(--danger);}
.grow{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.gico{font-size:17px;min-width:22px;text-align:center;}
.hcards{display:flex;gap:10px;}
.hcard{flex:1;padding:16px;border-radius:16px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;text-align:center;transition:all 0.2s;}
.hcard:active{transform:scale(0.97);}
.hcard.done-m{background:rgba(201,169,110,0.08);border-color:rgba(201,169,110,0.3);}
.hcard.done-a{background:rgba(139,124,248,0.08);border-color:rgba(139,124,248,0.3);}
.hcard-ico{font-size:28px;margin-bottom:6px;}
.hcard-lbl{font-size:12px;color:var(--muted);}
.hcard.done-m .hcard-lbl{color:var(--gold2);}
.hcard.done-a .hcard-lbl{color:#a78bfa;}
.streak{display:inline-flex;align-items:center;gap:6px;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);border-radius:20px;padding:5px 13px;font-size:13px;color:var(--warning);margin:0 14px 10px;}
.sbtn{width:calc(100% - 28px);margin:6px 14px 0;padding:15px;border:none;border-radius:14px;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;letter-spacing:0.04em;text-transform:uppercase;transition:opacity 0.2s;}
.sbtn:active{opacity:0.85;}
.sbtn-m{background:linear-gradient(135deg,#c9a96e,#e8c98a);color:#0a0a0f;}
.sbtn-a{background:linear-gradient(135deg,#8b7cf8,#a78bfa);color:#fff;}
.sbtn-export{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px;width:100%;box-sizing:border-box;}
.cdn{font-size:10px;color:var(--muted);text-align:center;padding:2px 0;font-weight:600;}
.cday{width:100%;aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;color:var(--muted);background:var(--surface2);gap:1px;cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent;min-width:0;overflow:hidden;}
.cday.cm{background:rgba(201,169,110,0.14);color:var(--gold2);}
.cday.cb{background:linear-gradient(135deg,rgba(201,169,110,0.2),rgba(139,124,248,0.15));color:var(--gold2);font-weight:600;}
.cday.ct{border:1.5px solid var(--gold);}
.cday.ce{background:none;cursor:default;}
.cday:not(.ce):active{opacity:0.7;transform:scale(0.93);}
.cdot{width:3px;height:3px;border-radius:50%;background:var(--gold);}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:0 14px 10px;}
.sbox{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;}
.sval{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;color:var(--gold2);}
.slbl{font-size:11px;color:var(--muted);margin-top:3px;}
.arow{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.albl{font-size:13px;color:var(--muted);flex:1;}
.abar{flex:0 0 80px;height:5px;border-radius:3px;background:rgba(255,255,255,0.06);margin:0 10px;overflow:hidden;}
.afill{height:100%;border-radius:3px;}
.aval{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold2);min-width:28px;text-align:right;}
.bars{display:flex;align-items:flex-end;gap:3px;height:75px;margin-top:10px;}
.bcol{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;}
.bbar{width:100%;border-radius:3px 3px 0 0;background:rgba(201,169,110,0.15);min-height:3px;}
.bbar.f{background:var(--gold);opacity:0.7;}
.blbl{font-size:9px;color:var(--muted);}
.dbar{height:6px;border-radius:3px;background:rgba(255,255,255,0.06);margin-top:7px;overflow:hidden;}
.dfill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--success));}
.recent{background:var(--surface2);border-radius:12px;padding:12px;margin-bottom:8px;}
.rdate{font-size:11px;color:var(--muted);margin-bottom:7px;}
.pills{display:flex;gap:5px;flex-wrap:wrap;}
.pill{padding:3px 9px;border-radius:20px;font-size:11px;background:rgba(201,169,110,0.1);color:var(--gold2);}
.pill-v{background:rgba(139,124,248,0.1);color:#a78bfa;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 20px;font-size:13px;color:var(--text);opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;z-index:300;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.ai-period-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:12px;cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;user-select:none;}
.ai-period-btn.on{background:rgba(201,169,110,0.12);border-color:rgba(201,169,110,0.4);color:var(--gold2);}

.gap{height:12px;}
</style>
</head>
<body>

<div id="app">
  <div class="toast" id="toast"></div>
  <div id="content">
    <div id="v-home"></div>
    <div id="v-morgen" style="display:none"></div>
    <div id="v-abend" style="display:none"></div>
    <div id="v-kal" style="display:none"></div>
    <div id="v-stats" style="display:none"></div>
    <div id="v-settings" style="display:none"></div>
  </div>
  <nav>
    <button class="nb on" onclick="go('home')" id="n-home"><span class="ico">🏠</span>Home</button>
    <button class="nb" onclick="go('morgen')" id="n-morgen"><span class="ico">🌅</span>Morgen</button>
    <button class="nb" onclick="go('abend')" id="n-abend"><span class="ico">🌙</span>Abend</button>
    <button class="nb" onclick="go('kal')" id="n-kal"><span class="ico">📅</span>Kalender</button>
    <button class="nb" onclick="go('stats')" id="n-stats"><span class="ico">📊</span>Stats</button>
  </nav>
</div>

<script>


// ── STATE ─────────────────────────────────────────────────────
let mData = {}, aData = {};
let quoteCache = null;
let currentView = 'home';
let aiPeriod = 30;
const SPORTS = ['💪 Gym','🏃 Joggen','🚶 Spaziergang','⚽ Fußball','❌ Kein Sport'];
const DESCS = ['Sehr schlecht','Schlecht','Mäßig','Eher schlecht','Neutral','Ok','Gut','Sehr gut','Ausgezeichnet','Perfekt'];

// ── STORAGE ───────────────────────────────────────────────────
function loadEntries() {
  try { const r = localStorage.getItem('j_entries'); return r ? JSON.parse(r) : {}; } catch(e) { return {}; }
}
function saveEntries(entries) {
  try { localStorage.setItem('j_entries', JSON.stringify(entries)); } catch(e) {}
}
function getEntries() { return loadEntries(); }
const $ = id => document.getElementById(id);
const today = () => new Date().toISOString().split('T')[0];
const fmtDE = s => { try { return new Date(s+'T12:00:00').toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'}); } catch(e){return s;} };
const fmtFull = () => new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

function toast(msg, ms=2500) {
  const el = $('toast'); el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

// ── NAVIGATION ────────────────────────────────────────────────
function go(v) {
  currentView = v;
  const views = ['home','morgen','abend','kal','stats','settings'];
  views.forEach(x => $('v-'+x).style.display = x===v ? 'block' : 'none');
  ['home','morgen','abend','kal','stats'].forEach(x => {
    const nb = $('n-'+x); if(nb) nb.classList.toggle('on', x===v);
  });
  $('content').scrollTop = 0;
  if(v==='home') rHome();
  if(v==='morgen') rMorgen();
  if(v==='abend') rAbend();
  if(v==='kal') rKal();
  if(v==='stats') rStats();
  if(v==='settings') rSettings();
}

// ── SLIDER ────────────────────────────────────────────────────
function slider(id, lbl, emoji, val) {
  const p = Math.round((val-1)/9*100);
  return `<div class="sl-row">
    <div class="sl-top">
      <span class="sl-lbl">${emoji} ${lbl}</span>
      <div style="text-align:right">
        <div class="sl-val" id="sv-${id}">${val}</div>
        <div class="sl-desc" id="sd-${id}">${DESCS[val-1]}</div>
      </div>
    </div>
    <input type="range" min="1" max="10" value="${val}" id="sl-${id}" style="--p:${p}%" oninput="onSlide('${id}',this.value)">
  </div>`;
}

function onSlide(id, v) {
  v = parseInt(v);
  const p = Math.round((v-1)/9*100);
  const el = $('sl-'+id); if(el) el.style.setProperty('--p', p+'%');
  const sv = $('sv-'+id); if(sv) sv.textContent = v;
  const sd = $('sd-'+id); if(sd) sd.textContent = DESCS[v-1];
  if(currentView==='morgen') mData[id] = v;
  else if(currentView==='abend') {
    const map = {ap:'produktiv',aw:'wohlbefinden',ae:'erfuellung',aen:'energie'};
    if(map[id]) aData[map[id]] = v;
  }
}

// ── QUOTE ─────────────────────────────────────────────────────
const QUOTES = [
  {zitat:'Der Mensch leidet viel mehr in der Einbildung als in der Wirklichkeit.', quelle:'Seneca'},
  {zitat:'Du hast Macht über deinen Geist, nicht über äußere Ereignisse. Erkenne dies und du wirst Stärke finden.', quelle:'Marc Aurel'},
  {zitat:'Sei kein Sklave deiner Vergangenheit – tauche tief in das Meer ein, das die Propheten verlassen haben.', quelle:'Ralph Waldo Emerson'},
  {zitat:'Und wer Gott vertraut, dem wird Er genügen. Gott erreicht stets Sein Ziel.', quelle:'Koran 65:3'},
  {zitat:'Denn ich weiß, welche Gedanken ich über euch habe – Gedanken des Friedens und nicht des Unglücks.', quelle:'Jeremia 29:11'},
  {zitat:'Behandle jeden Menschen wie Gott ihn sieht – mit Würde und Mitgefühl.', quelle:'Arabisches Sprichwort'},
  {zitat:'Das Glück deines Lebens hängt von der Beschaffenheit deiner Gedanken ab.', quelle:'Marc Aurel'},
  {zitat:'Fürchte Gott nicht, weil Er mächtig ist. Liebe Ihn, weil Er gütig ist.', quelle:'Ali ibn Abi Talib'},
  {zitat:'Wer sich selbst beherrscht, ist mächtiger als der, der Städte einnimmt.', quelle:'Sprüche 16:32'},
  {zitat:'Die Schwierigkeit liegt nicht darin, neue Ideen zu finden, sondern darin, den alten zu entkommen.', quelle:'John Maynard Keynes'},
  {zitat:'Stark sein bedeutet nicht, keine Schwäche zu haben. Stark sein bedeutet, trotz Schwäche weiterzumachen.', quelle:'Theodore Roosevelt'},
  {zitat:'Im Gebet liegt die Kraft. Wer betet, kämpft nie allein.', quelle:'Augustinus von Hippo'},
  {zitat:'Vertraue auf den Herrn von ganzem Herzen und stütze dich nicht auf deinen Verstand.', quelle:'Sprüche 3:5'},
  {zitat:'Das Leben ist kurz. Verschwende keine Zeit damit, andere zu hassen.', quelle:'Ali ibn Abi Talib'},
  {zitat:'Was mich nicht umbringt, macht mich stärker.', quelle:'Friedrich Nietzsche'},
  {zitat:'Die beste Rache ist großer Erfolg.', quelle:'Frank Sinatra'},
  {zitat:'Werde der Mensch, von dem du dachtest, du bräuchtest ihn als Kind.', quelle:'Carl Jung'},
  {zitat:'Disziplin ist die Brücke zwischen Zielen und Leistung.', quelle:'Jim Rohn'},
  {zitat:'Du musst sein, was du dir wünschst in der Welt zu sehen.', quelle:'Mahatma Gandhi'},
  {zitat:'Die größte Entdeckung aller Zeiten ist, dass ein Mensch seine Zukunft verändern kann, indem er seine Einstellung ändert.', quelle:'Oprah Winfrey'},
  {zitat:'Gott ist mit denen, die Geduld haben.', quelle:'Koran 2:153'},
  {zitat:'Alles Große in der Welt geschieht durch Leidenschaft.', quelle:'Georg Wilhelm Friedrich Hegel'},
  {zitat:'Der Anfang ist die Hälfte des Ganzen.', quelle:'Aristoteles'},
  {zitat:'Was du heute tust, entscheidet, wer du morgen bist.', quelle:'Sprichwort'},
  {zitat:'Suche das Reich Gottes, und das andere wird euch hinzugegeben werden.', quelle:'Lukas 12:31'},
  {zitat:'Die Seele wird durch Einsamkeit und Stille gestärkt.', quelle:'Ibn Ata Allah'},
  {zitat:'Wenn der Wind der Veränderung weht, bauen manche Mauern und andere Windmühlen.', quelle:'Chinesisches Sprichwort'},
  {zitat:'Erfolg ist kein Glück. Es ist harte Arbeit, Ausdauer, Lernen, Opfer und Liebe zu dem, was du tust.', quelle:'Pelé'},
  {zitat:'Der Mensch braucht Schwierigkeiten – sie sind notwendig für die Gesundheit.', quelle:'Carl Jung'},
  {zitat:'Und nach der Erschwernis kommt Leichtigkeit.', quelle:'Koran 94:6'},
];

function getQuote() {
  const td = today();
  // Use date as seed for consistent daily quote
  const seed = parseInt(td.replace(/-/g,'')) % QUOTES.length;
  return QUOTES[seed];
}

// ── HOME ──────────────────────────────────────────────────────
function rHome() {
  const entries = getEntries();
  const td = today(), te = entries[td]||{};
  const hm = !!te.m, ha = !!te.a;
  const h = new Date().getHours();
  const gr = h<12?'🌅 Guten Morgen':h<18?'☀️ Guten Tag':'🌙 Guten Abend';
  const st = calcStreak(entries);
  const dates = Object.keys(entries).sort((a,b)=>b.localeCompare(a)).slice(0,3);

  $('v-home').innerHTML = `
    <div class="hdr">
      <div class="hdr-date">${fmtFull()}</div>
      <div class="hdr-title">${gr}</div>
      <div class="hdr-sub">Dein persönlicher Begleiter</div>
    </div>
    ${st>0?`<div class="streak">🔥 ${st} Tag${st>1?'e':''} in Folge</div>`:''}
    <div class="gap"></div>
    <div class="card">
      <div class="ct">Heute</div>
      <div class="hcards">
        <div class="hcard ${hm?'done-m':''}" onclick="go('morgen')">
          <div class="hcard-ico">🌅</div>
          <div class="hcard-lbl">${hm?'✓ Ausgefüllt':'Morgenjournal'}</div>
        </div>
        <div class="hcard ${ha?'done-a':''}" onclick="go('abend')">
          <div class="hcard-ico">🌙</div>
          <div class="hcard-lbl">${ha?'✓ Ausgefüllt':'Abendjournal'}</div>
        </div>
      </div>
    </div>
    ${dates.length?`<div class="card"><div class="ct">Letzte Einträge</div>
      ${dates.map(d=>{const e=entries[d];return`<div class="recent">
        <div class="rdate">${fmtDE(d)}</div>
        <div class="pills">
          ${e.m?`<span class="pill">🎭 ${e.m.stimmung}</span><span class="pill">⚡ ${e.m.energie}</span><span class="pill">😴 ${e.m.schlaf}</span>`:''}
          ${e.a?`<span class="pill pill-v">📈 ${e.a.produktiv}</span>`:''}
        </div>
      </div>`;}).join('')}
    </div>`:''}
    <div class="card" style="cursor:pointer" onclick="go('settings')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:14px;color:var(--muted)">⚙️ Einstellungen & Export</span>
        <span style="color:var(--muted)">›</span>
      </div>
    </div>
    <div style="height:10px"></div>
  `;
}

// ── MORGEN ────────────────────────────────────────────────────
function rMorgen() {
  const entries = getEntries();
  const td = today(), ex = entries[td]?.m;
  mData = ex ? {...ex, sport:[...(ex.sport||[])], tasks:[...(ex.tasks||['','',''])]} : {
    schlaf:7,energie:7,stimmung:7,schaerfe:7,spirituell:7,
    sport:[],sportPlan:'',tasks:['','',''],
    dankbarkeit:'',intention:'',affirmation:'',gedanken:''
  };

function tSportA(s) {
  if(s==='kein') {
    aData.sportGemacht=[];aData.sportDone=false;setSport(false);

    aData.sportGemacht.includes(s)?aData.sportGemacht=aData.sportGemacht.filter(x=>x!==s):aData.sportGemacht.push(s);
    if(aData.sportGemacht.length>0){aData.sportDone=true;setSport(true);}
  }
  const tags=$('a-stags');
  if(tags) tags.innerHTML=SPORTS.filter(sp=>!sp.includes('Kein')).map(sp=>`<div class="stag ${(aData.sportGemacht||[]).includes(sp)?'on':''}" onclick="tSportA('${sp}')">${sp}</div>`).join('')

}

function setSport(v) {
  aData.sportDone=v;
  const by=$('btn-y'),bn=$('btn-n');
  if(by){by.classList.toggle('yes',v===true);by.classList.remove('no');}
  if(bn){bn.classList.toggle('no',v===false);bn.classList.remove('yes');}

// ── KALENDER ──────────────────────────────────────────────────
function rKal() {
  const entries=getEntries();
  const now=new Date(),y=now.getFullYear(),mo=now.getMonth();
  const first=new Date(y,mo,1),last=new Date(y,mo+1,0);
  const startDow=(first.getDay()+6)%7,td=today();
  const allDates=Object.keys(entries);
  const total=allDates.length,st=calcStreak(entries);
  const sportD=Object.values(entries).filter(e=>e.a?.sportDone===true).length;
  const sportT=Object.values(entries).filter(e=>e.m?.sport?.some(s=>!s.includes('Kein'))).length;
  const disc=sportT>0?Math.round(sportD/sportT*100):0;

  let cal='<div class="cgrid">';
  ['Mo','Di','Mi','Do','Fr','Sa','So'].forEach(d=>cal+=`<div class="cdn">${d}</div>`);
  for(let i=0;i<startDow;i++) cal+='<div class="cday ce"></div>';
  for(let d=1;d<=last.getDate();d++){
    const ds=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const e=entries[ds],hm=!!e?.m,ha=!!e?.a;
    const cls=hm&&ha?'cb':hm?'cm':'';
    const future=ds>td;
    cal+=`<div class="cday ${cls} ${ds===td?'ct':''}" ${!future?`onclick="openDay('${ds}')"`:''}>${d}${hm?'<div class="cdot"></div>':''}</div>`;
  }
  cal+='</div>';

  $('v-kal').innerHTML=`
    <div class="hdr">
      <div class="hdr-title">📅 Kalender</div>
      <div class="hdr-sub">${now.toLocaleDateString('de-DE',{month:'long',year:'numeric'})}</div>
    </div>
    <div style="margin:0 14px 8px;display:flex;gap:12px;font-size:12px;color:var(--muted);align-items:center">
      <span style="width:11px;height:11px;border-radius:3px;background:rgba(201,169,110,0.14);display:inline-block"></span>Morgen
      <span style="width:11px;height:11px;border-radius:3px;background:linear-gradient(135deg,rgba(201,169,110,0.2),rgba(139,124,248,0.15));display:inline-block"></span>Morgen+Abend
    </div>
    <div class="card" style="padding:12px 10px;">${cal}</div>
    <div class="sgrid">
      <div class="sbox"><div class="sval">${total}</div><div class="slbl">Journal-Tage</div></div>
      <div class="sbox"><div class="sval">🔥 ${st}</div><div class="slbl">Tage in Folge</div></div>
      <div class="sbox"><div class="sval">${sportD}</div><div class="slbl">Sport gemacht</div></div>
      <div class="sbox"><div class="sval">${disc}%</div><div class="slbl">Disziplin</div></div>
    </div>
    <div class="card">
      <div class="ct">Sport-Disziplin</div>
      <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--muted)">
        <span>${sportD} von ${sportT} Einheiten</span><span>${disc}%</span>
      </div>
      <div class="dbar"><div class="dfill" style="width:${disc}%"></div></div>
    </div>
  `;
}

function editDay(dateStr, type) {
  // Remove modal
  const modal = document.getElementById('day-modal');
  if(modal) modal.remove();
  // Set editing date and load that day's data
  editingDate = dateStr;
  if(type==='morgen') {
    const entries = getEntries();
    const ex = entries[dateStr]?.m;
    mData = ex ? {...ex, sport:[...(ex.sport||[])], tasks:[...(ex.tasks||['','',''])]} : {
      schlaf:7,energie:7,stimmung:7,schaerfe:7,spirituell:7,
      sport:[],sportPlan:'',tasks:['','',''],
      dankbarkeit:'',intention:'',affirmation:'',gedanken:''
    };
    // Render morgen form with editing date
    renderMorgenForm(dateStr);
  } else {
    const entries = getEntries();
    const ex = entries[dateStr]?.a;
    const m = entries[dateStr]?.m;
    aData = ex ? {...ex, dankbarkeit:[...(ex.dankbarkeit||['','',''])], sportGemacht:[...(ex.sportGemacht||[])]} : {
      produktiv:7,wohlbefinden:7,erfuellung:7,energie:7,
      erreicht:'',positiv:'',learning:'',dankbarkeit:['','',''],
      schritt:'',satz:'',sportDone:null,sportGrund:'',sportGemacht:[]
    };
    renderAbendForm(dateStr, m);
  }
}

function setAIP(d) {

  document.querySelectorAll('.ai-period-btn').forEach(b=>b.classList.remove('on'));
  const btns=document.querySelectorAll('.ai-period-btn');
  btns.forEach(b=>{if(b.textContent.includes(d===365?'Jahr':d===90?'3':d+'')){b.classList.add('on');}});
}

async function runAI() {
  const btn=$('ai-btn'), res=$('ai-result');
  if(!window._statsData){toast('Bitte Stats-Seite neu laden');return;}
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-aiPeriod);
  const cutoffStr=cutoff.toISOString().split('T')[0];
  const mF=window._statsData.mAll.filter(e=>e.datum>=cutoffStr);
  const aF=window._statsData.aAll.filter(e=>e.datum>=cutoffStr);
  if(!mF.length){toast('Keine Daten für diesen Zeitraum');return;}
  btn.textContent='⏳ Analysiert...';btn.disabled=true;
  if(res)res.innerHTML='';

  const avgF=(arr,key)=>{const vs=arr.map(e=>e[key]).filter(v=>v!=null);return vs.length?(vs.reduce((a,b)=>a+b,0)/vs.length).toFixed(1):'keine Daten';};
  const sportD=aF.filter(e=>e.sportDone===true).length;
  const sportT=aF.filter(e=>e.sportDone!==null&&e.sportDone!==undefined).length;
  const mid=Math.floor(mF.length/2);
  const first=mF.slice(0,mid),second=mF.slice(mid);
  const trend=first.length&&second.length?((second.reduce((a,e)=>a+(e.stimmung||0),0)/second.length)-(first.reduce((a,e)=>a+(e.stimmung||0),0)/first.length)).toFixed(1):null;

  const prompt=`Du bist ein persönlicher Lebenscoach. Analysiere diese Journal-Daten der letzten ${aiPeriod} Tage (${mF.length} Einträge) auf Deutsch.

DATEN:
Zeitraum: ${aiPeriod} Tage | Einträge: ${mF.length} Morgen, ${aF.length} Abend

Ø MORGEN: Schlaf=${avgF(mF,'schlaf')}/10 | Energie=${avgF(mF,'energie')}/10 | Stimmung=${avgF(mF,'stimmung')}/10 | Mentale Schärfe=${avgF(mF,'schaerfe')}/10 | Spiritualität=${avgF(mF,'spirituell')}/10

Ø ABEND: Produktivität=${avgF(aF,'produktiv')}/10 | Wohlbefinden=${avgF(aF,'wohlbefinden')}/10 | Erfüllung=${avgF(aF,'erfuellung')}/10

SPORT: ${sportT>0?Math.round(sportD/sportT*100)+'% Disziplin ('+sportD+' von '+sportT+' Einheiten)':'keine Daten'}

TREND Stimmung: ${trend!==null?(parseFloat(trend)>0?'📈 +'+trend+' (verbessert)':'📉 '+trend+' (verschlechtert)'):'nicht berechenbar'}

LETZTE 14 TAGE:
${mF.slice(-14).map(e=>`${e.datum}: Schlaf=${e.schlaf}, Energie=${e.energie}, Stimmung=${e.stimmung}`).join('\n')}

Analysiere in diesen Abschnitten (mit ## Titel):
## 🔍 Was ich in deinen Daten sehe
## 🔗 Wichtige Zusammenhänge  
## 💡 3 konkrete Empfehlungen
## 🌱 Dein größtes Wachstumspotenzial
## ⚡ Deine Stärken

Sei direkt, warm, konkret. Sprich mich mit "du" an. Keine leeren Phrasen.`;

  try {
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,messages:[{role:'user',content:prompt}]})});
    const d=await r.json();
    const text=d.content?.[0]?.text||'Keine Antwort.';
    const html=text.replace(/## (.*)/g,'<div style="font-size:11px;font-weight:600;color:var(--gold);letter-spacing:0.1em;text-transform:uppercase;margin:18px 0 8px">$1</div>')
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n\n/g,'<br><br>').replace(/\n- /g,'<br>• ').replace(/\n(\d)\./g,'<br>$1.');
    if(res)res.innerHTML=`<div class="card" style="border-color:rgba(201,169,110,0.2)">
      <div class="ct">✨ KI-Analyse – ${aiPeriod} Tage</div>
      <div style="font-size:14px;line-height:1.7;color:#c8c8d8">${html}</div>
      <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)">
        Basierend auf ${mF.length} Einträgen · ${new Date().toLocaleDateString('de-DE')}
      </div>
    </div>`;
  } catch(e) {
    if(res)res.innerHTML='<div class="card"><div style="color:var(--danger);font-size:14px">Fehler. Prüfe Internetverbindung.</div></div>';
  }
  btn.textContent='✨ Erneut analysieren';btn.disabled=false;
}

function exportCSV() {
  const entries=getEntries();
  const rows=[['Datum','Schlaf','Energie','Stimmung','Mentale Schärfe','Spirituell','Sport geplant','Aufgaben','Produktivität','Wohlbefinden','Erfüllung','Sport gemacht','Dankbarkeit','Learning']];
  Object.entries(entries).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([d,e])=>{
    rows.push([d,
      e.m?.schlaf||'',e.m?.energie||'',e.m?.stimmung||'',e.m?.schaerfe||'',e.m?.spirituell||'',
      (e.m?.sport||[]).join(';'),(e.m?.tasks||[]).join(';'),
      e.a?.produktiv||'',e.a?.wohlbefinden||'',e.a?.erfuellung||'',
      e.a?.sportDone!=null?(e.a.sportDone?'Ja':'Nein'):'',
      (e.a?.dankbarkeit||[]).join(';'),e.a?.learning||''
    ]);
  });
  const csv=rows.map(r=>r.map(c=>'"'+(c+'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`journal-export-${today()}.csv`;a.click();
  URL.revokeObjectURL(url);
  toast('✓ CSV Export gestartet');
}

// ── HELPERS ───────────────────────────────────────────────────
function calcStreak(entries) {
  let s=0;
  for(let i=0;i<365;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const k=d.toISOString().split('T')[0];
    if(entries[k]?.m||entries[k]?.a)s++;else break;
  }
  return s;
}

go('home');
