<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mein Journal">
<title>Mein Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #18181f;
  --border: rgba(255,255,255,0.06);
  --gold: #c9a96e;
  --gold2: #e8c98a;
  --violet: #8b7cf8;
  --text: #e8e8f0;
  --muted: #5a5a70;
  --success: #4ade80;
  --danger: #f87171;
  --warning: #fbbf24;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body {
  background:var(--bg); color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:15px;
}
#app {
  height:100vh; display:flex; flex-direction:column;
  max-width:520px; margin:0 auto; position:relative;
}

/* SCROLL AREA */
#content {
  flex:1; overflow-y:auto; padding:0 0 100px;
  -webkit-overflow-scrolling:touch;
}
#content::-webkit-scrollbar { display:none; }

/* NAV */
nav {
  position:absolute; bottom:0; left:0; right:0;
  background:rgba(11,11,17,0.97); border-top:1px solid var(--border);
  display:flex; padding:8px 0 max(12px, env(safe-area-inset-bottom));
  backdrop-filter:blur(20px); z-index:100;
}
.nb {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  background:none; border:none; color:var(--muted); cursor:pointer;
  font-family:'DM Sans',sans-serif; font-size:10px; font-weight:500;
  transition:color 0.2s; padding:4px 0;
}
.nb .ico { font-size:22px; line-height:1; }
.nb.on { color:var(--gold); }

/* HEADER */
.hdr {
  padding:max(44px,env(safe-area-inset-top)) 20px 20px;
  background:radial-gradient(ellipse at 50% -20%, rgba(201,169,110,0.1) 0%, transparent 70%);
  text-align:center;
}
.hdr-date { font-size:11px; color:var(--muted); letter-spacing:0.15em; text-transform:uppercase; margin-bottom:6px; }
.hdr-title { font-family:'Cormorant Garamond',serif; font-size:32px; font-weight:300; color:var(--gold2); letter-spacing:0.02em; }
.hdr-sub { font-size:13px; color:var(--muted); margin-top:3px; }

/* CARDS */
.card {
  margin:0 14px 10px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:18px; padding:18px; position:relative;
}
.card::after {
  content:''; position:absolute; top:0; left:20px; right:20px; height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,169,110,0.2),transparent);
}
.ct { font-size:10px; font-weight:600; color:var(--gold); letter-spacing:0.12em; text-transform:uppercase; margin-bottom:14px; }

/* QUOTE */
.quote {
  margin:0 14px 10px;
  background:linear-gradient(135deg,rgba(201,169,110,0.06),rgba(139,124,248,0.04));
  border:1px solid rgba(201,169,110,0.15); border-radius:18px; padding:18px;
}
.quote-t { font-family:'Cormorant Garamond',serif; font-size:17px; font-style:italic; font-weight:300; color:var(--gold2); line-height:1.65; margin-bottom:8px; }
.quote-s { font-size:11px; color:var(--muted); text-align:right; }

/* SLIDERS */
.sl-row { margin-bottom:16px; }
.sl-top { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:7px; }
.sl-lbl { font-size:13px; color:#9090a8; }
.sl-right { text-align:right; }
.sl-val { font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:600; color:var(--gold2); line-height:1; }
.sl-desc { font-size:10px; color:var(--muted); margin-top:1px; }
input[type=range] {
  width:100%; height:3px; border-radius:2px;
  -webkit-appearance:none; appearance:none; outline:none; cursor:pointer;
  background:linear-gradient(to right, var(--gold) 0%, var(--gold) var(--p,60%), rgba(255,255,255,0.08) var(--p,60%));
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:20px; height:20px; border-radius:50%;
  background:var(--gold2); border:2.5px solid var(--bg); cursor:pointer;
  box-shadow:0 0 10px rgba(201,169,110,0.5);
}

/* INPUTS */
.fl { font-size:13px; color:#9090a8; margin-bottom:7px; display:block; }
.fg { margin-bottom:14px; }
textarea, input[type=text] {
  width:100%; background:rgba(255,255,255,0.03); border:1px solid var(--border);
  border-radius:11px; padding:11px 13px; color:var(--text); font-size:14px;
  font-family:'DM Sans',sans-serif; resize:none; line-height:1.55; outline:none;
  transition:border-color 0.2s; -webkit-appearance:none;
}
textarea:focus, input[type=text]:focus { border-color:rgba(201,169,110,0.35); }

/* SPORT TAGS */
.stags { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:12px; }
.stag {
  padding:7px 13px; border-radius:20px; border:1px solid var(--border);
  background:var(--surface2); color:var(--muted); font-size:13px; cursor:pointer;
  transition:all 0.15s; font-family:'DM Sans',sans-serif; user-select:none;
}
.stag.on { background:rgba(201,169,110,0.12); border-color:rgba(201,169,110,0.5); color:var(--gold2); }
.stag.danger { background:rgba(248,113,113,0.1); border-color:rgba(248,113,113,0.4); color:var(--danger); }

/* TASKS */
.trow { display:flex; align-items:center; gap:9px; margin-bottom:9px; }
.tnum { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--gold); min-width:20px; }
.tinp {
  flex:1; background:rgba(255,255,255,0.03); border:1px solid var(--border);
  border-radius:10px; padding:10px 12px; color:var(--text); font-size:14px;
  font-family:'DM Sans',sans-serif; outline:none;
}
.tinp:focus { border-color:rgba(201,169,110,0.35); }

/* TOGGLE */
.tgl { display:flex; gap:8px; margin-bottom:10px; }
.tglb {
  flex:1; padding:11px; border-radius:11px; border:1px solid var(--border);
  background:var(--surface2); color:var(--muted); font-size:14px; cursor:pointer;
  font-family:'DM Sans',sans-serif; font-weight:500; transition:all 0.15s;
}
.tglb.yes { background:rgba(74,222,128,0.1); border-color:rgba(74,222,128,0.4); color:var(--success); }
.tglb.no { background:rgba(248,113,113,0.1); border-color:rgba(248,113,113,0.4); color:var(--danger); }

/* GRATITUDE */
.grow { display:flex; align-items:center; gap:9px; margin-bottom:9px; }
.gico { font-size:17px; min-width:22px; text-align:center; }

/* HOME CARDS */
.hcards { display:flex; gap:10px; }
.hcard {
  flex:1; padding:16px; border-radius:16px; border:1px solid var(--border);
  background:var(--surface2); cursor:pointer; text-align:center; transition:all 0.2s;
}
.hcard:active { transform:scale(0.97); }
.hcard.done-m { background:rgba(201,169,110,0.08); border-color:rgba(201,169,110,0.3); }
.hcard.done-a { background:rgba(139,124,248,0.08); border-color:rgba(139,124,248,0.3); }
.hcard-ico { font-size:28px; margin-bottom:6px; }
.hcard-lbl { font-size:12px; color:var(--muted); }
.hcard.done-m .hcard-lbl { color:var(--gold2); }
.hcard.done-a .hcard-lbl { color:#a78bfa; }

/* STREAK */
.streak {
  display:inline-flex; align-items:center; gap:6px;
  background:rgba(251,191,36,0.08); border:1px solid rgba(251,191,36,0.2);
  border-radius:20px; padding:5px 13px; font-size:13px; color:var(--warning);
  margin:0 14px 10px;
}

/* SAVE BTN */
.sbtn {
  width:calc(100% - 28px); margin:6px 14px 0; padding:15px;
  border:none; border-radius:14px; font-size:15px; font-weight:600;
  font-family:'DM Sans',sans-serif; cursor:pointer; letter-spacing:0.04em;
  text-transform:uppercase; transition:opacity 0.2s;
}
.sbtn:active { opacity:0.85; }
.sticky-save {
  width:100%;
  padding:0 14px;
  margin-top:8px;
}
.sticky-save button { box-shadow:none; }
.sbtn-m { background:linear-gradient(135deg,#c9a96e,#e8c98a); color:#0a0a0f; }
.sbtn-a { background:linear-gradient(135deg,#8b7cf8,#a78bfa); color:#fff; }

/* CALENDAR */
.cgrid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-top:10px; }
.cdn { font-size:10px; color:var(--muted); text-align:center; padding:3px 0; font-weight:600; }
.cday {
  aspect-ratio:1; border-radius:7px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; font-size:12px; color:var(--muted);
  background:var(--surface2); gap:2px;
}
.cday.cm { background:rgba(201,169,110,0.14); color:var(--gold2); }
.cday.cb { background:linear-gradient(135deg,rgba(201,169,110,0.2),rgba(139,124,248,0.15)); color:var(--gold2); font-weight:600; }
.cday.ct { border:1.5px solid var(--gold); }
.cday.ce { background:none; }
.cdot { width:3px; height:3px; border-radius:50%; background:var(--gold); }

/* STATS */
.sgrid { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin:0 14px 10px; }
.sbox { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px; text-align:center; }
.sval { font-family:'Cormorant Garamond',serif; font-size:30px; font-weight:600; color:var(--gold2); }
.slbl { font-size:11px; color:var(--muted); margin-top:3px; }

/* AVG BARS */
.arow { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.albl { font-size:13px; color:var(--muted); flex:1; }
.abar { flex:0 0 80px; height:5px; border-radius:3px; background:rgba(255,255,255,0.06); margin:0 10px; overflow:hidden; }
.afill { height:100%; border-radius:3px; }
.aval { font-family:'Cormorant Garamond',serif; font-size:20px; color:var(--gold2); min-width:28px; text-align:right; }

/* CHART */
.bars { display:flex; align-items:flex-end; gap:3px; height:75px; margin-top:10px; }
.bcol { display:flex; flex-direction:column; align-items:center; gap:3px; flex:1; }
.bbar { width:100%; border-radius:3px 3px 0 0; background:rgba(201,169,110,0.15); min-height:3px; }
.bbar.f { background:var(--gold); opacity:0.7; }
.blbl { font-size:9px; color:var(--muted); }

/* DISC BAR */
.dbar { height:6px; border-radius:3px; background:rgba(255,255,255,0.06); margin-top:7px; overflow:hidden; }
.dfill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--gold),var(--success)); }

/* RECENT */
.recent { background:var(--surface2); border-radius:12px; padding:12px; margin-bottom:8px; }
.rdate { font-size:11px; color:var(--muted); margin-bottom:7px; }
.pills { display:flex; gap:5px; flex-wrap:wrap; }
.pill { padding:3px 9px; border-radius:20px; font-size:11px; background:rgba(201,169,110,0.1); color:var(--gold2); }
.pill-v { background:rgba(139,124,248,0.1); color:#a78bfa; }

/* SYNC STATUS */
.sync { position:fixed; top:max(12px,env(safe-area-inset-top)); right:14px; font-size:11px; color:var(--muted); z-index:200; display:flex; align-items:center; gap:4px; }
.sync-dot { width:6px; height:6px; border-radius:50%; background:var(--success); }
.sync-dot.err { background:var(--danger); }
.sync-dot.loading { background:var(--warning); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* TOAST */
.toast {
  position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:10px 20px; font-size:13px; color:var(--text); opacity:0;
  transition:all 0.3s; pointer-events:none; white-space:nowrap; z-index:300;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

.gap { height:12px; }
.ai-period-btn {
  padding:6px 14px; border-radius:20px; border:1px solid var(--border);
  background:var(--surface2); color:var(--muted); font-size:12px; cursor:pointer;
  transition:all 0.15s; font-family:'DM Sans',sans-serif; user-select:none;
}
.ai-period-btn.on { background:rgba(201,169,110,0.12); border-color:rgba(201,169,110,0.4); color:var(--gold2); }
</style>
</head>
<body>
<div id="app">
  <div class="sync" id="sync"><div class="sync-dot loading" id="syncDot"></div><span id="syncTxt">Verbinde...</span></div>
  <div class="toast" id="toast"></div>

  <div id="content">
    <div id="v-home"></div>
    <div id="v-morgen" style="display:none"></div>
    <div id="v-abend" style="display:none"></div>
    <div id="v-kal" style="display:none"></div>
    <div id="v-stats" style="display:none"></div>
  </div>

  <nav>
    <button class="nb on" onclick="go('home')" id="n-home"><span class="ico">🏠</span>Home</button>
    <button class="nb" onclick="go('morgen')" id="n-morgen"><span class="ico">🌅</span>Morgen</button>
    <button class="nb" onclick="go('abend')" id="n-abend"><span class="ico">🌙</span>Abend</button>
    <button class="nb" onclick="go('kal')" id="n-kal"><span class="ico">📅</span>Kalender</button>
    <button class="nb" onclick="go('stats')" id="n-stats"><span class="ico">📊</span>Stats</button>
  </nav>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
const SB_URL = 'https://bgnfqhaxeftnjuvefxjp.supabase.co';
const SB_KEY = 'sb_publishable_i6cVZRIyn2BIo1qwnvw0BQ_nEeamxLo';
const HEADS = { 'Content-Type':'application/json', 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY };

// ── STATE ─────────────────────────────────────────────────────
let cache = {};
let mData = {}, aData = {};
let quoteCache = null;
let currentView = 'home';
const SPORTS = ['💪 Gym','🏃 Joggen','🚶 Spaziergang','⚽ Fußball','❌ Kein Sport'];
const DESCS = ['Sehr schlecht','Schlecht','Mäßig','Eher schlecht','Neutral','Ok','Gut','Sehr gut','Ausgezeichnet','Perfekt'];

// ── HELPERS ───────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const today = () => new Date().toISOString().split('T')[0];
const fmtDE = s => { try { return new Date(s+'T12:00:00').toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'}); } catch(e){return s;} };
const fmtFull = () => new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

function toast(msg, ms=2000) {
  const el = $('toast'); el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

function setSyncStatus(state, txt) {
  const dot = $('syncDot'), stxt = $('syncTxt');
  dot.className = 'sync-dot' + (state==='ok'?' ':state==='err'?' err':' loading');
  if(txt) stxt.textContent = txt;
}

// ── SUPABASE ──────────────────────────────────────────────────
async function sbGet(table, datum) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/${table}?datum=eq.${datum}&limit=1`, { headers: HEADS });
    const d = await r.json();
    return d?.[0] || null;
  } catch(e) { return null; }
}

async function sbUpsert(table, data) {
  try {
    setSyncStatus('loading', 'Speichert...');
    const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: { ...HEADS, 'Prefer': 'resolution=merge-duplicates' },
      body: JSON.stringify(data)
    });
    if(r.ok) { setSyncStatus('ok', 'Gespeichert'); return true; }
    else { setSyncStatus('err', 'Fehler'); return false; }
  } catch(e) { setSyncStatus('err', 'Offline'); return false; }
}

async function sbGetAll(table) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/${table}?select=datum,stimmung,energie,schlaf,produktiv&order=datum.desc&limit=90`, { headers: HEADS });
    return await r.json() || [];
  } catch(e) { return []; }
}

// ── NAVIGATION ────────────────────────────────────────────────
function go(v) {
  currentView = v;
  ['home','morgen','abend','kal','stats'].forEach(x => {
    $('v-'+x).style.display = x===v ? 'block' : 'none';
    $('n-'+x).classList.toggle('on', x===v);
  });
  $('content').scrollTop = 0;
  if(v==='home') rHome();
  if(v==='morgen') rMorgen();
  if(v==='abend') rAbend();
  if(v==='kal') rKal();
  if(v==='stats') rStats();
}

// ── SLIDER ────────────────────────────────────────────────────
function slider(id, lbl, emoji, val) {
  const p = Math.round((val-1)/9*100);
  return `<div class="sl-row">
    <div class="sl-top">
      <span class="sl-lbl">${emoji} ${lbl}</span>
      <div class="sl-right">
        <div class="sl-val" id="sv-${id}">${val}</div>
        <div class="sl-desc" id="sd-${id}">${DESCS[val-1]}</div>
      </div>
    </div>
    <input type="range" min="1" max="10" value="${val}" id="sl-${id}"
      style="--p:${p}%" oninput="onSlide('${id}',this.value)">
  </div>`;
}

function onSlide(id, v) {
  v = parseInt(v);
  const p = Math.round((v-1)/9*100);
  const el = $('sl-'+id); if(el) el.style.setProperty('--p', p+'%');
  const sv = $('sv-'+id); if(sv) sv.textContent = v;
  const sd = $('sd-'+id); if(sd) sd.textContent = DESCS[v-1];
  // update data objects
  if(currentView==='morgen') mData[id] = v;
  else if(currentView==='abend') {
    const map = {ap:'produktiv',aw:'wohlbefinden',ae:'erfuellung',aen:'energie'};
    if(map[id]) aData[map[id]] = v;
  }
}

// ── QUOTE ─────────────────────────────────────────────────────
async function getQuote() {
  const td = today();
  const stored = localStorage.getItem('quote_' + td);
  if(stored) return JSON.parse(stored);
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:200,
        messages:[{role:'user',content:'Gib mir ein tiefes inspirierendes Zitat auf Deutsch von einem Stoiker, aus der Bibel, dem Koran oder einer erfolgreichen Persönlichkeit. Antworte NUR als JSON ohne Markdown: {"zitat":"...","quelle":"..."}'}]})
    });
    const d = await r.json();
    const q = JSON.parse(d.content[0].text.trim().replace(/```json|```/g,''));
    localStorage.setItem('quote_'+td, JSON.stringify(q));
    return q;
  } catch(e) {
    return {zitat:'Wer sich selbst beherrscht, ist mächtiger als der, der Städte einnimmt.', quelle:'Sprüche 16:32'};
  }
}

// ── HOME ──────────────────────────────────────────────────────
async function rHome() {
  const td = today();
  const h = new Date().getHours();
  const gr = h<12?'🌅 Guten Morgen':h<18?'☀️ Guten Tag':'🌙 Guten Abend';

  setSyncStatus('loading', 'Lädt...');
  const [mEntry, aEntry] = await Promise.all([sbGet('morgen', td), sbGet('abend', td)]);
  setSyncStatus('ok', 'Verbunden');

  // calc streak from local cache
  const streak = await calcStreak();

  const dates = Object.keys(cache).sort((a,b)=>b.localeCompare(a)).slice(0,3);

  $('v-home').innerHTML = `
    <div class="hdr">
      <div class="hdr-date">${fmtFull()}</div>
      <div class="hdr-title">${gr}</div>
      <div class="hdr-sub">Dein täglicher Begleiter</div>
    </div>
    ${streak>0?`<div class="streak">🔥 ${streak} Tag${streak>1?'e':''} in Folge</div>`:''}
    <div class="gap"></div>
    <div class="card">
      <div class="ct">Heute</div>
      <div class="hcards">
        <div class="hcard ${mEntry?'done-m':''}" onclick="go('morgen')">
          <div class="hcard-ico">🌅</div>
          <div class="hcard-lbl">${mEntry?'✓ Ausgefüllt':'Morgenjournal'}</div>
        </div>
        <div class="hcard ${aEntry?'done-a':''}" onclick="go('abend')">
          <div class="hcard-ico">🌙</div>
          <div class="hcard-lbl">${aEntry?'✓ Ausgefüllt':'Abendjournal'}</div>
        </div>
      </div>
    </div>
    <div id="recent-section"></div>
  `;

  // Load recent async
  loadRecent();
}

async function loadRecent() {
  const all = await sbGetAll('morgen');
  const allA = await sbGetAll('abend');
  const aMap = {};
  allA.forEach(e => aMap[e.datum] = e);

  if(!all.length) return;
  const recent = all.slice(0,4);
  const html = `<div class="card"><div class="ct">Letzte Einträge</div>
    ${recent.map(e=>`<div class="recent">
      <div class="rdate">${fmtDE(e.datum)}</div>
      <div class="pills">
        <span class="pill">🎭 ${e.stimmung||'–'}</span>
        <span class="pill">⚡ ${e.energie||'–'}</span>
        <span class="pill">😴 ${e.schlaf||'–'}</span>
        ${aMap[e.datum]?`<span class="pill pill-v">📈 ${aMap[e.datum].produktiv||'–'}</span>`:''}
      </div>
    </div>`).join('')}
  </div>`;
  const s = $('recent-section');
  if(s) s.innerHTML = html;
}

async function calcStreak() {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/morgen?select=datum&order=datum.desc&limit=60`, { headers: HEADS });
    const dates = (await r.json()).map(e=>e.datum);
    let s=0;
    for(let i=0;i<60;i++){
      const d = new Date(); d.setDate(d.getDate()-i);
      const k = d.toISOString().split('T')[0];
      if(dates.includes(k)) s++; else break;
    }
    return s;
  } catch(e) { return 0; }
}

async function rKal() {
  const now=new Date(),y=now.getFullYear(),mo=now.getMonth();
  const first=new Date(y,mo,1),last=new Date(y,mo+1,0);
  const startDow=(first.getDay()+6)%7,td=today();

  setSyncStatus('loading','Lädt...');
  const [mAll,aAll] = await Promise.all([sbGetAll('morgen'),sbGetAll('abend')]);
  setSyncStatus('ok','Verbunden');

  const mDates=new Set(mAll.map(e=>e.datum));
  const aDates=new Set(aAll.map(e=>e.datum));
  const total=mDates.size;
  const st=await calcStreak();

  const sportDone=aAll.filter(e=>e.sport_done===true).length;
  const mWithSport=mAll.filter(e=>e.sport&&e.sport.some(s=>!s.includes('Kein'))).length;
  const disc=mWithSport>0?Math.round(sportDone/mWithSport*100):0;

  let cal='<div class="cgrid">';
  ['Mo','Di','Mi','Do','Fr','Sa','So'].forEach(d=>cal+=`<div class="cdn">${d}</div>`);
  for(let i=0;i<startDow;i++) cal+='<div class="cday ce"></div>';
  for(let d=1;d<=last.getDate();d++){
    const ds=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hm=mDates.has(ds),ha=aDates.has(ds);
    const cls=hm&&ha?'cb':hm?'cm':'';
    const ct=ds===td?'ct':'';
    cal+=`<div class="cday ${cls} ${ct}">${d}${hm?'<div class="cdot"></div>':''}</div>`;
  }
  cal+='</div>';

  $('v-kal').innerHTML=`
    <div class="hdr">
      <div class="hdr-title">📅 Kalender</div>
      <div class="hdr-sub">${now.toLocaleDateString('de-DE',{month:'long',year:'numeric'})}</div>
    </div>
    <div style="margin:0 14px 8px;display:flex;gap:12px;font-size:12px;color:var(--muted);align-items:center">
      <span style="width:11px;height:11px;border-radius:3px;background:rgba(201,169,110,0.14);display:inline-block"></span>Morgen
      <span style="width:11px;height:11px;border-radius:3px;background:linear-gradient(135deg,rgba(201,169,110,0.2),rgba(139,124,248,0.15));display:inline-block"></span>Morgen+Abend
    </div>
    <div class="card">${cal}</div>
    <div class="sgrid">
      <div class="sbox"><div class="sval">${total}</div><div class="slbl">Journal-Tage</div></div>
      <div class="sbox"><div class="sval">🔥 ${st}</div><div class="slbl">Tage in Folge</div></div>
      <div class="sbox"><div class="sval">${sportDone}</div><div class="slbl">Sport gemacht</div></div>
      <div class="sbox"><div class="sval">${disc}%</div><div class="slbl">Disziplin</div></div>

    <div class="card">
      <div class="ct">Sport-Disziplin</div>
      <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--muted)">
        <span>${sportDone} von ${mWithSport} Einheiten</span><span>${disc}%</span>

      <div class="dbar"><div class="dfill" style="width:${disc}%"></div></div>

  `;
}

  // Group by month for trend

            <td style="color:var(--muted);padding:4px 0;font-size:11px">⚡</td>
            ${months.map(m=>`<td style="text-align:center;padding:4px 6px">
              <span style="font-size:15px;font-weight:500;color:${moAvg(byMonth[m].energie)>=7?'var(--success)':moAvg(byMonth[m].energie)>=5?'var(--gold2)':'var(--danger)'}">${moAvg(byMonth[m].energie)}</span>
            </td>`).join('')}
          </tr>
          <tr>
            <td style="color:var(--muted);padding:4px 0;font-size:11px">😴</td>
            ${months.map(m=>`<td style="text-align:center;padding:4px 6px">
              <span style="font-size:15px;font-weight:500;color:${moAvg(byMonth[m].schlaf)>=7?'var(--success)':moAvg(byMonth[m].schlaf)>=5?'var(--gold2)':'var(--danger)'}">${moAvg(byMonth[m].schlaf)}</span>
            </td>`).join('')}
          </tr>
          <tr>
            <td style="color:var(--muted);padding:4px 0;font-size:11px">🙏</td>
            ${months.map(m=>`<td style="text-align:center;padding:4px 6px">
              <span style="font-size:15px;font-weight:500;color:${moAvg(byMonth[m].spirituell)>=7?'var(--success)':moAvg(byMonth[m].spirituell)>=5?'var(--gold2)':'var(--danger)'}">${moAvg(byMonth[m].spirituell)}</span>
            </td>`).join('')}
          </tr>
          <tr>
            <td style="color:var(--muted);padding:4px 0;font-size:11px">💪</td>
            ${months.map(m=>{
              const a=aByMonth[m]||{sportDone:0,sportTotal:0};
              const pct=a.sportTotal>0?Math.round(a.sportDone/a.sportTotal*100):0;
              return`<td style="text-align:center;padding:4px 6px">
                <span style="font-size:13px;font-weight:500;color:${pct>=70?'var(--success)':pct>=40?'var(--gold2)':'var(--danger)'}">${pct}%</span>
              </td>`;
            }).join('')}
          </tr>
        </table>
      </div>
      <div style="margin-top:12px;display:flex;gap:12px;font-size:11px;color:var(--muted)">
        <span style="color:var(--success)">● ≥7 Gut</span>
        <span style="color:var(--gold2)">● ≥5 Ok</span>
        <span style="color:var(--danger)">● &lt;5 Schwach</span>
      </div>
    </div>`:''}

    ${months.length>0?`<div class="card">
      <div class="ct">🏆 Bester & schlechtester Monat</div>
      ${(()=>{
        let best=null,worst=null,bestVal=0,worstVal=11;
        months.forEach(m=>{
          const v=parseFloat(moAvg(byMonth[m].stimmung));
          if(!isNaN(v)){
            if(v>bestVal){bestVal=v;best=m;}
            if(v<worstVal){worstVal=v;worst=m;}
          }
        });
        return `
          <div style="display:flex;gap:10px">
            <div style="flex:1;background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.2);border-radius:12px;padding:14px;text-align:center">
              <div style="font-size:20px;margin-bottom:4px">🏆</div>
              <div style="font-size:13px;color:var(--success);font-weight:500">${best?moLabel(best):'–'}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:2px">Stimmung Ø ${bestVal.toFixed(1)}</div>
            </div>
            <div style="flex:1;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:12px;padding:14px;text-align:center">
              <div style="font-size:20px;margin-bottom:4px">📉</div>
              <div style="font-size:13px;color:var(--danger);font-weight:500">${worst&&worst!==best?moLabel(worst):'–'}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:2px">Stimmung Ø ${worst&&worst!==best?worstVal.toFixed(1):'–'}</div>
            </div>
          </div>`;
      })()}
    </div>`:''}

    ${!mAll.length?'<div class="card" style="text-align:center;padding:32px;color:var(--muted)">Noch keine Einträge.<br><br>Starte dein erstes Morgenjournal! 🌅</div>':''}

    <div class="card" style="background:linear-gradient(135deg,rgba(201,169,110,0.08),rgba(139,124,248,0.06));border-color:rgba(201,169,110,0.2)">
      <div class="ct">🤖 KI-Persönlichkeitsanalyse</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:14px">
        Claude analysiert deine Journal-Daten und gibt dir tiefe Einblicke: Muster, Zusammenhänge, konkrete Empfehlungen und Wachstumspotenziale.
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <div id="ai-period-7" class="ai-period-btn on" onclick="setAIPeriod(7)">7 Tage</div>
        <div id="ai-period-30" class="ai-period-btn" onclick="setAIPeriod(30)">30 Tage</div>
        <div id="ai-period-90" class="ai-period-btn" onclick="setAIPeriod(90)">3 Monate</div>
        <div id="ai-period-365" class="ai-period-btn" onclick="setAIPeriod(365)">1 Jahr</div>
      </div>
      <button class="sbtn sbtn-m" id="ai-btn" onclick="runAIAnalysis()" style="margin:0;padding:13px;font-size:14px">
        ✨ Jetzt analysieren
      </button>
    </div>

    <div id="ai-result" style="display:none"></div>
    <div style="height:10px"></div>
  \`;

  // Store data for AI analysis
  window._statsData = { mAll, aAll };
}

// ── AI ANALYSIS ───────────────────────────────────────────────
let aiPeriod = 7;

function setAIPeriod(days) {
  aiPeriod = days;
  document.querySelectorAll('.ai-period-btn').forEach(b => b.classList.remove('on'));
  const el = document.getElementById('ai-period-' + days);
  if(el) el.classList.add('on');
}

async function runAIAnalysis() {
  const btn = $('ai-btn');
  const result = $('ai-result');
  if(!window._statsData) { toast('Bitte zuerst Stats laden'); return; }

  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - aiPeriod);
  const cutoffStr = cutoff.toISOString().split('T')[0];

  const mFiltered = window._statsData.mAll.filter(e => e.datum >= cutoffStr);
  const aFiltered = window._statsData.aAll.filter(e => e.datum >= cutoffStr);

  if(mFiltered.length === 0) { toast('Keine Daten für diesen Zeitraum'); return; }

  btn.textContent = '⏳ Analysiert...';
  btn.disabled = true;
  result.style.display = 'none';

  // Build summary for Claude
  const avgM = (key) => {
    const vs = mFiltered.map(e=>e[key]).filter(v=>v!=null);
    return vs.length ? (vs.reduce((a,b)=>a+b,0)/vs.length).toFixed(1) : 'keine Daten';
  };
  const avgA = (key) => {
    const vs = aFiltered.map(e=>e[key]).filter(v=>v!=null);
    return vs.length ? (vs.reduce((a,b)=>a+b,0)/vs.length).toFixed(1) : 'keine Daten';
  };

  const sportDone = aFiltered.filter(e=>e.sport_done===true).length;
  const sportTotal = aFiltered.filter(e=>e.sport_done!==null).length;
  const sportDisc = sportTotal > 0 ? Math.round(sportDone/sportTotal*100) + '%' : 'keine Daten';

  // Trend: first half vs second half
  const mid = Math.floor(mFiltered.length/2);
  const first = mFiltered.slice(0, mid);
  const second = mFiltered.slice(mid);
  const trendStimmung = first.length && second.length ?
    ((second.reduce((a,e)=>a+(e.stimmung||0),0)/second.length) - (first.reduce((a,e)=>a+(e.stimmung||0),0)/first.length)).toFixed(1) : null;

  const prompt = `Du bist ein persönlicher Lebenscoach und Psychologe. Analysiere folgende Journal-Daten der letzten ${aiPeriod} Tage (${mFiltered.length} Einträge) und gib eine tiefe, ehrliche und konstruktive Analyse auf Deutsch.

DATEN-ZUSAMMENFASSUNG:
Zeitraum: ${mFiltered.length} Tage
Einträge: ${mFiltered.length} Morgen, ${aFiltered.length} Abend

Ø MORGEN-WERTE:
- Schlafqualität: ${avgM('schlaf')}/10
- Energie: ${avgM('energie')}/10  
- Stimmung: ${avgM('stimmung')}/10
- Mentale Schärfe: ${avgM('schaerfe')}/10
- Spirituelle Verbundenheit: ${avgM('spirituell')}/10

Ø ABEND-WERTE:
- Produktivität: ${avgA('produktiv')}/10
- Wohlbefinden: ${avgA('wohlbefinden')}/10
- Erfüllung: ${avgA('erfuellung')}/10

SPORT-DISZIPLIN: ${sportDisc} (${sportDone} von ${sportTotal} geplanten Einheiten)

TREND (erste vs zweite Hälfte des Zeitraums):
Stimmung: ${trendStimmung !== null ? (trendStimmung > 0 ? '+' + trendStimmung + ' (positiver Trend 📈)' : trendStimmung + ' (negativer Trend 📉)') : 'nicht berechenbar'}

TAGES-DETAILS (letzte 14 Tage):
${mFiltered.slice(-14).map(e=>`${e.datum}: Schlaf=${e.schlaf}, Energie=${e.energie}, Stimmung=${e.stimmung}, Spirituell=${e.spirituell}`).join('\n')}

Strukturiere deine Analyse in folgende Abschnitte:

## 🔍 Was ich in deinen Daten sehe
(Ehrliche Bestandsaufnahme – was fällt auf, was ist gut, was ist besorgniserregend?)

## 🔗 Wichtige Zusammenhänge
(Was korreliert miteinander? Wann bist du am besten drauf? Was zieht dich runter?)

## 💡 Meine konkreten Empfehlungen
(Mindestens 3 spezifische, umsetzbare Maßnahmen – keine generischen Ratschläge)

## 🌱 Dein größtes Wachstumspotenzial
(Ein Bereich wo kleine Veränderungen die größte Wirkung hätten)

## ⚡ Deine Stärken
(Was läuft bereits gut – was sollst du beibehalten und ausbauen?)

Sei direkt, konkret und persönlich. Sprich mich mit "du" an. Keine leeren Phrasen.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await resp.json();
    const text = data.content?.[0]?.text || 'Keine Antwort erhalten.';

    // Render markdown-like text
    const rendered = text
      .replace(/## (.*)/g, '<div style="font-size:12px;font-weight:600;color:var(--gold);letter-spacing:0.1em;text-transform:uppercase;margin:18px 0 10px">$1</div>')
      .replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--text)">$1</strong>')
      .replace(/

/g, '<br><br>')
      .replace(/
- /g, '<br>• ')
      .replace(/
(\d)\./g, '<br>$1.');

    result.style.display = 'block';
    result.innerHTML = `
      <div class="card" style="border-color:rgba(201,169,110,0.2)">
        <div class="ct">✨ Deine KI-Analyse – ${aiPeriod} Tage</div>
        <div style="font-size:14px;line-height:1.7;color:#c8c8d8">${rendered}</div>
        <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)">
          Basierend auf ${mFiltered.length} Journal-Einträgen · ${new Date().toLocaleDateString('de-DE')}
        </div>
      </div>
    `;
  } catch(e) {
    result.style.display = 'block';
    result.innerHTML = '<div class="card"><div style="color:var(--danger);font-size:14px">Fehler bei der Analyse. Prüfe deine Internetverbindung.</div></div>';
  }

  btn.textContent = '✨ Erneut analysieren';
  btn.disabled = false;
}

// ── INIT ──────────────────────────────────────────────────────
go('home');
</script>
</body>
</html>
